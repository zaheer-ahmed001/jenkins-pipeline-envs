services:
  nginx:
    image: nginx:alpine
    container_name: nginx-staging
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./html/staging:/usr/share/nginx/html
    environment:
      - ENVIRONMENT=staging
    networks:
      - staging-network

  postgres:
    image: postgres:15
    container_name: postgres-staging
    environment:
      POSTGRES_USER: staginguser
      POSTGRES_PASSWORD: stagingpass
      POSTGRES_DB: stagingdb
    volumes:
      - staging-pgdata:/var/lib/postgresql/data
    networks:
      - staging-network

networks:
  staging-network:
    driver: bridge

volumes:
  staging-pgdata:
