<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dev Environment</title>
  <style>
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      gap: 10px;
    }
    .badge {
      background: #1f6feb;
      color: white;
      padding: 6px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }
    h1 { font-size: 2.5rem; margin: 0; }
    p { color: #8b949e; font-size: 1rem; margin: 0; }
  </style>
</head>
<body>
  <div class="badge">DEV</div>
  <h1>Development Environment</h1>
  <p>Branch: dev | Port: 8081</p>
  <p>For testing only — not for end users.</p>
</body>
</html>
