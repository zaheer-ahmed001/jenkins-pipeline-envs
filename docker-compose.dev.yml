services:
  nginx:
    image: nginx:alpine
    container_name: nginx-dev
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./html/dev:/usr/share/nginx/html
    environment:
      - ENVIRONMENT=dev
    networks:
      - dev-network

  postgres:
    image: postgres:15
    container_name: postgres-dev
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    volumes:
      - dev-pgdata:/var/lib/postgresql/data
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge

volumes:
  dev-pgdata:
